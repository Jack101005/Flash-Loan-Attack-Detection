services:
  # --- 1. Zookeeper (Official) ---
  zookeeper:
    image: zookeeper:latest
    networks:
      - flashloan-network
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    healthcheck:
      test: ["CMD-SHELL", "echo stat | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 2. Kafka (Confluent) ---
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    networks:
      - flashloan-network
    env_file: .env
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_RETENTION_BYTES: 536870912
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
    post_start:
      - command: kafka-topics --bootstrap-server localhost:9092 --create --if-not-exists --topic raw_txns --partitions 4 --replication-factor 1

  # --- 3. Redis (Alpine) ---
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - flashloan-network
    # Config: 256mb, allkeys-lru
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- 4. MongoDB (Official) ---
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    networks:
      - flashloan-network
    env_file: .env
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand(\"ping\").ok' --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 5. Spark Master (Apache) ---
  spark-master:
    image: apache/spark:latest
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - flashloan-network
    entrypoint: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    healthcheck:
      test: ["CMD", "timeout", "5s", "bash", "-c", "</dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 6 & 7. Spark Workers ---
  spark-worker-1:
    image: apache/spark:latest
    networks:
      - flashloan-network
    entrypoint: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      spark-master:
        condition: service_healthy

  spark-worker-2:
    image: apache/spark:latest
    networks:
      - flashloan-network
    entrypoint: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      spark-master:
        condition: service_healthy

  # --- 8. Ingestion (Tự build) ---
  ingestion:
    build: ../ingestion
    container_name: ingestion_service
    env_file: .env
    networks:
      - flashloan-network
    depends_on:
      kafka:
        condition: service_healthy
    restart: always

  # --- 9. Price Feed (Tự build) ---
  price-feed:
    build: ../db
    container_name: price_feed_service
    env_file: .env
    networks:
      - flashloan-network
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  # --- 10. Processing Job (Tự build) ---
  processing-job:
    build: ../processing
    container_name: spark_processing_job
    env_file: .env
    networks:
      - flashloan-network
    depends_on:
      spark-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- 11. Dashboard (Tự build) ---
  dashboard:
    build: ../dashboard
    container_name: streamlit_dashboard
    ports:
      - "8501:8501"
    env_file: .env
    networks:
      - flashloan-network
    depends_on:
      mongodb:
        condition: service_healthy
    restart: always

networks:
  flashloan-network:
    driver: bridge

volumes:
  mongo_data: